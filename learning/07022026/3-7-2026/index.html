<!doctype html>
<html>
  <head>
    <title>Bootstrap</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <!-- Modal -->
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-primary">
      <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">
          <i class="bi bi-shop"></i> Product Store
        </span>
        <button
          class="btn btn-light position-relative"
          type="button"
          data-bs-toggle="offcanvas"
          data-bs-target="#cartOffcanvas"
          onclick="displayCart()"
        >
          <i class="bi bi-cart3"></i> Cart
          <span
            class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
            id="cartBadge"
          >
            0
          </span>
        </button>
      </div>
    </nav>
    <div
      class="modal fade"
      id="exampleModal"
      tabindex="-1"
      aria-labelledby="exampleModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h1
              class="modal-title fs-5 product-details-title"
              id="exampleModalLabel"
            >
              Modal title
            </h1>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body modalContent">
            <div class="row">
              <div class="col-md-6">
                <div>
                  <img class="product-details-image" src="" />
                </div>
              </div>
              <div class="col-md-6">
                <img />
                <div>
                  <div>
                    <strong>Description:</strong>
                    <div class="product-details-description"></div>
                  </div>
                  <div>
                    <strong>Price:</strong>
                    <div class="product-details-price"></div>
                  </div>
                  <div>
                    <strong>Category:</strong>
                    <div class="product-details-category"></div>
                  </div>
                  <div>
                    <strong>Available Stock:</strong>
                    <div class="product-details-stock"></div>
                  </div>
                  <div class="d-flex align-items-center gap-3 mt-4">
                    <label class="fw-bold">Quantity:</label>
                    <div class="btn-group" role="group">
                      <button
                        type="button"
                        class="btn btn-outline-secondary"
                        onclick="decreaseQuantity()"
                      >
                        -
                      </button>
                      <input
                        type="text"
                        class="form-control text-center"
                        id="quantityInput"
                        value="1"
                        readonly
                      />
                      <button
                        type="button"
                        class="btn btn-outline-secondary"
                        onclick="increaseQuantity()"
                      >
                        +
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Close
            </button>
            <button
              type="button"
              class="btn btn-primary"
              data-bs-dismiss="modal"
              onclick="addToCart()"
            >
              Add to Cart
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="container">
      <h2>Our Products</h2>
      <div class="productItems row">
        <div class="col-md-4">
          <div class="card">
            <img
              src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=400"
              class="card-img-top"
            />
            <div class="card-body">
              <h5 class="card-title">LapTop</h5>
              <p>Electronics</p>
              <p class="card-text">
                High-performance laptop for work and gaming
              </p>
              <p>$999.99</p>
              <p>In Stoke:</p>
              <button
                type="button"
                class="btn btn-primary"
                data-bs-toggle="modal"
                data-bs-target="#exampleModal"
                onclick="showDetails()"
              >
                Show Details
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
      <div id="addToCartToast" class="toast" role="alert">
        <div class="toast-header bg-success text-white">
          <i class="bi bi-check-circle me-2"></i>
          <strong class="me-auto">Success</strong>
          <button
            type="button"
            class="btn-close btn-close-white"
            data-bs-dismiss="toast"
          ></button>
        </div>
        <div class="toast-body" id="toastMessage">Item added to cart!</div>
      </div>
    </div>
    <!-- Cart Offcanvas -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="cartOffcanvas">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title">Shopping Cart</h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="offcanvas"
        ></button>
      </div>
      <div class="offcanvas-body">
        <div id="cartItems">
          <p class="text-muted text-center">Your cart is empty</p>
        </div>
        <div class="mt-auto">
          <hr />
          <div class="d-flex justify-content-between">
            <strong>Total:</strong>
            <strong id="cartTotal">$0.00</strong>
          </div>
        </div>
      </div>
    </div>
    <script>
      let products = [
        {
          id: 1,
          name: 'Laptop',
          description: 'High-performance laptop for work and gaming',
          price: 999.99,
          category: 'Electronics',
          stock: 5,
          image:
            'https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=400',
        },
        {
          id: 2,
          name: 'Smartphone',
          description: 'Latest model with amazing camera',
          price: 699.99,
          category: 'Electronics',
          stock: 0,
          image:
            'https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=400',
        },
        {
          id: 3,
          name: 'Headphones',
          description: 'Noise-cancelling wireless headphones',
          price: 199.99,
          category: 'Audio',
          stock: 15,
          image:
            'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400',
        },
        {
          id: 4,
          name: 'Keyboard',
          description: 'Mechanical gaming keyboard with RGB',
          price: 89.99,
          category: 'Accessories',
          stock: 8,
          image:
            'https://images.unsplash.com/photo-1587829741301-dc798b83add3?w=400',
        },
        {
          id: 5,
          name: 'Mouse',
          description: 'Ergonomic wireless mouse',
          price: 49.99,
          category: 'Accessories',
          stock: 12,
          image:
            'https://images.unsplash.com/photo-1527864550417-7fd91fc51a46?w=400',
        },
      ];

      let productItems = document.querySelector('.productItems');
      let content = '';
      for (let i = 0; i < products.length; i++) {
        let currentproducts = products[i];

        let buttonAttribute = '';

        if (currentproducts.stock < 1) {
          productStatues = 'opacity-50';
          buttonAttribute = 'disabled';
        }

        content =
          content +
          `        
        <div class="col-md-4">
          <div class="card">
            <img
              src="${currentproducts.image}"
              class="card-img-top"
            />
            <div class="card-body">
              <h5 class="card-title">${currentproducts.name}</h5>
              <p>${currentproducts.category}</p>
              <p class="card-text">
                ${currentproducts.description}
              </p>
              <p>${currentproducts.price}</p>
              <p>In Stoke: ${currentproducts.stock}</p>
              <button ${buttonAttribute}
                type="button"
                class="btn btn-primary"
                data-bs-toggle="modal"
                data-bs-target="#exampleModal"
                onclick="showDetails(${i})"
              >
                Show Details
              </button>
            </div>
          </div>
        </div>`;
      }

      productItems.innerHTML = content;

      let currentProduct;

      function showDetails(index) {
        currentProduct = products[index];
        let productDetailsTitle = document.querySelector(
          '.product-details-title',
        );
        let productDetailsDescription = document.querySelector(
          '.product-details-description',
        );
        let productDetailsPrice = document.querySelector(
          '.product-details-price',
        );
        let productDetailsCategory = document.querySelector(
          '.product-details-category',
        );
        let productDetailsStock = document.querySelector(
          '.product-details-stock',
        );
        let productDetailsQuantity = document.querySelector(
          '.product-details-quantity',
        );
        let productDetailsImage = document.querySelector(
          '.product-details-image',
        );

        productDetailsTitle.innerHTML = currentProduct.name;
        productDetailsDescription.innerHTML = currentProduct.description;
        productDetailsPrice.innerHTML = currentProduct.price;
        productDetailsCategory.innerHTML = currentProduct.category;
        productDetailsStock.innerHTML = currentProduct.stock;
        productDetailsImage.innerHTML = currentProduct.image;
        document.getElementById('quantityInput').value = 1;
        currentQuantity = 1;
      }

      let currentQuantity = 0;
      function increaseQuantity() {
        let input = document.querySelector('#quantityInput');
        let inputValue = Number(input.value);
        inputValue = inputValue + 1;

        if (inputValue > 1 && inputValue <= currentProduct.stock) {
          input.value = inputValue;
          currentQuantity = inputValue;
        }
      }

      // Decrease quantity
      function decreaseQuantity() {
        if (currentQuantity > 1) {
          currentQuantity = currentQuantity - 1;
          document.getElementById('quantityInput').value = currentQuantity;
        }
      }

      let cart = [];

      // Add to cart
      function addToCart() {
        // Show toast
        let toastElement = document.querySelector('#addToCartToast');
        let toast = new bootstrap.Toast(toastElement);

        toast.show();

        // update toast content
        let toastMessage = document.querySelector('#toastMessage');

        toastMessage.innerHTML = `${currentProduct.name} (x${currentQuantity}) Items added to cart`;

        // record information you want to add to cart
        cart.push({
          item: currentProduct,
          quantity: currentQuantity,
        });

        console.log('cart', cart);

        // update Cart button badge
        let cartQuantity = 0;
        let cartBadge = document.querySelector('#cartBadge');
        for (let i = 0; i < cart.length; i++) {
          let currentCartItem = cart[i];

          cartQuantity = cartQuantity + currentCartItem.quantity;
        }

        cartBadge.innerHTML = cartQuantity;
      }

      function displayCart() {
        // cart array
        // loop through it to display the cart items similar to products list above
        let cartContent = '';
        let finalTotal = 0;
        for (let i = 0; i < cart.length; i++) {
          let currentCartItem = cart[i];
          let currentCartItemTotal =
            currentCartItem.item.price * currentCartItem.quantity;
          cartContent =
            cartContent +
            `
                    <div class="card mb-2">
                            <div class="card-body p-2">
                                <h6 class="mb-1">${currentCartItem.item.name}</h6>
                                <p class="mb-1 small text-muted">$${currentCartItem.item.price} x ${currentCartItem.quantity}</p>
                                <p class="mb-0"><strong>$${currentCartItemTotal}</strong></p>
                            </div>
                        </div>
                    `;

          finalTotal = finalTotal + currentCartItemTotal;
        }

        let cartItems = document.querySelector('#cartItems');
        cartItems.innerHTML = cartContent;

        let cartTotal = document.querySelector('#cartTotal');
        cartTotal.innerHTML = finalTotal;
      }
    </script>
  </body>
</html>
