<!doctype html>
<html lang="en">
  <head>
    <title>HTML Template</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div class="container">
      <h1 class="text-center mt-3">
        <i class="bi bi-images pe-2"></i>Image Gallery
      </h1>
      <div class="gallery row gx-5 row-cols-3">
        <div class="col">
          <div>
            <div class="card">
              <img
                src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600"
                class="card-img-top"
              />
              <div class="card-body">
                <h5 class="card-title">Mountain Lake</h5>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script>
      let images = [
        {
          url: 'https://images.unsplash.com/photo-1448375240586-882707db888b?w=600',
          title: 'Forest Path',
        },
        {
          url: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600',
          title: 'Ocean Sunset',
        },
        {
          url: 'https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?w=600',
          title: 'City Skyline',
        },
        {
          url: 'https://images.unsplash.com/photo-1509316785289-025f5b846b35?w=600',
          title: 'Desert Dunes',
        },
      ];
      let gallery = document.querySelector('.gallery');
      gallery.innerHTML = '';
      for (let i = 1; i < images.length; i++) {
        let currentImages = images[i];
        let content = `
        <div class="col">
          <div>
            <div class="card">
              <img
                src="${currentImages.url}"
                class="card-img-top"
              />
              <div class="card-body">
                <h5 class="card-title">${currentImages.title}</h5>
              </div>
            </div>
          </div>
        </div>
      `;
        gallery.innerHTML = gallery.innerHTML + content;
      }
    </script>
  </body>
</html>
