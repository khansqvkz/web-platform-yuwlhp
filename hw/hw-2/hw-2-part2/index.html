<!doctype html>
<html lang="en">
  <head>
    <title>HTML Template</title>
    <style>
      .smallbox {
        position: absolute;
        background-color: lightgrey;
        width: 80px;
        height: 80px;
      }

      .bigbox {
        position: relative;
        border: 2px dashed lightgrey;
        width: 700px;
        height: 500px;
      }
    </style>
  </head>
  <body>
    <button onclick="move('top')">Up</button>
    <button onclick="move('down')">Down</button>
    <button onclick="move('left')">Left</button>
    <button onclick="move('right')">Right</button>
    <div class="bigbox">
      <div class="smallbox" style="top: 0px; left: 0px"></div>
    </div>

    <script>
      // 4 buttons
      // 2 ways to setup function
      // let leftPosition = 0;
      // let topPosition = 0;
      // function move(direction) {
      // if (direction === 'right') {
      // leftPosition = leftPosition + 10;
      //  }
      // }
      //function moveLeft() {
      // leftPosition = leftPosition + 10;
      // }
      // - moveLeft, moveRight, moveDown, moveUp
      // - move(direction) - use if/else if to detect the direction
      // Step 1
      // 2 variables leftPosition = 0; topPosition = 0;

      // Step 1
      // get the 2 variables
      // Step 2
      // calculate the new position based on the direction
      // Step 3
      // google how to set style top and left for an element in
      let leftPosition = 0;
      let topPosition = 0;
      function move(direction) {
        let smallbox = document.querySelector('.smallbox');

        if (direction === 'right') {
          leftPosition = leftPosition + 10;
        } else if (direction === 'left') {
          leftPosition = leftPosition - 10;
        } else if (direction === 'top') {
          topPosition = topPosition - 10;
        } else if (direction === 'down') {
          topPosition = topPosition + 10;
        }

        smallbox.style.top = `${topPosition}px`;
        smallbox.style.left = `${leftPosition}px`;
      }

      document.addEventListener('keydown', function (event) {
        switch (event.key) {
          case 'ArrowUp':
            console.log('Up arrow pressed');
            move('top')
            break;
          case 'ArrowDown':
            console.log('Down arrow pressed');
            move('down')
            break;
          case 'ArrowLeft':
            console.log('Left arrow pressed');
            move('left')
            break;
          case 'ArrowRight':
            console.log('Right arrow pressed');
            move('right')
            break;
          default:
            break; 
        }
      });
    </script>
  </body>
</html>
