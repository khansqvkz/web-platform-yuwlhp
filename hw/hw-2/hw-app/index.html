<!doctype html>
<html>
  <head>
    <title>Get to know Bootstrap</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <nav
      class="navbar navbar-dark sticky-top bg-dark flex-md-nowrap p-0 shadow"
    >
      <div class="container-fluid">
        <a class="navbar-brand ps-2" href="#">My app</a>
      </div>
    </nav>
    <div class="row g-0 text-left">
      <div class="col-6 col-md-2 pe-5 border-right ps-2 fs-5">
        <div class="position-sticky pt-3">
          <ul class="nav flex-column">
            <li class="nav-item">
              <a class="nav-link active pe-2" aria-current="page" href="#">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="feather feather-home"
                  aria-hidden="true"
                >
                  <path
                    d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"
                  ></path>
                  <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                Dashboard
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="feather feather-file"
                  aria-hidden="true"
                >
                  <path
                    d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"
                  ></path>
                  <polyline points="13 2 13 9 20 9"></polyline>
                </svg>
                Orders
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="feather feather-shopping-cart"
                  aria-hidden="true"
                >
                  <circle cx="9" cy="21" r="1"></circle>
                  <circle cx="20" cy="21" r="1"></circle>
                  <path
                    d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"
                  ></path>
                </svg>
                Products
              </a>
            </li>
          </ul>
        </div>
      </div>

      <div class="col-sm-6 col-md-10">
        <div
          id="carouselExampleIndicators"
          class="carousel slide"
          data-bs-ride="carousel"
        >
          <div class="carousel-indicators">
            <button
              type="button"
              data-bs-target="#carouselExampleIndicators"
              data-bs-slide-to="0"
              class="active"
              aria-current="true"
              aria-label="Slide 1"
            ></button>
            <button
              type="button"
              data-bs-target="#carouselExampleIndicators"
              data-bs-slide-to="1"
              aria-label="Slide 2"
            ></button>
            <button
              type="button"
              data-bs-target="#carouselExampleIndicators"
              data-bs-slide-to="2"
              aria-label="Slide 3"
            ></button>
          </div>
          <div class="carousel-inner">
            <div class="carousel-item active">
              <img
                src="https://cdn.openart.ai/stable_diffusion/2e48fa8e1f7e60fceebfc26edb34b1150b27a452_2000x2000.webp"
                class="d-block w-100"
              />
            </div>
            <div class="carousel-item">
              <img
                src="https://cdn.openart.ai/stable_diffusion/2e48fa8e1f7e60fceebfc26edb34b1150b27a452_2000x2000.webp"
                class="d-block w-100"
              />
            </div>
            <div class="carousel-item">
              <img
                src="https://cdn.openart.ai/stable_diffusion/2e48fa8e1f7e60fceebfc26edb34b1150b27a452_2000x2000.webp"
                class="d-block w-100"
              />
            </div>
          </div>
          <button
            class="carousel-control-prev"
            type="button"
            data-bs-target="#carouselExampleIndicators"
            data-bs-slide="prev"
          >
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
          </button>
          <button
            class="carousel-control-next"
            type="button"
            data-bs-target="#carouselExampleIndicators"
            data-bs-slide="next"
          >
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
          </button>
        </div>
        <h2 class="pt-3 pb-1">Place new order</h2>
        <div class="row">
          <div class="col-md-9">
            <div class="alert alert-primary me-2" role="alert">
              <i class="bi bi-info-circle-fill pe-2"></i>Fill in the form below
              to place your order!
            </div>
            <div class="row">
              <div class="col-md-6">
                <div class="pb-2">Email</div>
                <div class="input-group">
                  <span class="input-group-text">@</span>
                  <input type="email" class="form-control" id="inputEmail4" />
                </div>
              </div>

              <div class="col-md-6">
                <div class="pb-2">Password</div>
                <input type="email" class="form-control" id="inputEmail4" />
              </div>
            </div>
            <div class="pt-3 pb-2">Description</div>
            <input type="email" class="form-control pb-5" id="inputEmail4" />
            <label for="exampleColorInput" class="form-label pt-4"
              >Color picker</label
            >
            <input
              type="color"
              class="form-control form-control-color"
              id="exampleColorInput"
              value="#563d7c"
              title="Choose your color"
            />
            <label for="address" class="form-label pt-4">Address</label>
            <input
              type="text"
              class="form-control"
              id="address"
              placeholder="1234 Main St"
              required=""
            />
            <label for="address" class="form-label pt-4">Address 2</label>
            <input
              type="text"
              class="form-control"
              id="address"
              placeholder="Apartment, studio, or floor"
              required=""
            />
            <div class="row pt-3">
              <div class="col-6 col-md-6">
                <div class="pb-2">City</div>
                <input type="email" class="form-control" id="inputEmail4" />
              </div>
              <div class="col-6 col-md-4">
                <div class="pb-2">Section</div>
                <select id="inputState" class="form-select">
                  <option selected="">Choose...</option>
                  <option>...</option>
                </select>
              </div>
              <div class="col-6 col-md-2">
                <div class="pb-2">Zip</div>
                <input type="email" class="form-control" id="inputEmail4" />
              </div>
            </div>
            <div class="form-check pt-3">
              <input
                class="form-check-input"
                type="checkbox"
                value=""
                id="flexCheckDefault"
              />
              <label class="form-check-label pb-4" for="flexCheckDefault">
                Check me out
              </label>
            </div>
            <div class="text-end">
              <button class="btn btn-primary" type="submit">
                <i class="bi bi-send-arrow-up-fill pe-2"></i>Sign in
              </button>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card" style="width: 18rem">
              <div class="card-header">Featured</div>
              <img
                src="https://cdn.ttgtmedia.com/rms/onlineimages/hp_elitebook_mobile.jpg"
                class="card-img-top"
                alt="..."
              />
              <div class="card-body">
                <h5 class="card-title">Special title treatment</h5>
                <p class="card-text">
                  With supporting text below as a natural lead-in to additional
                  content.
                </p>
                <button type="button" class="btn btn-outline-primary">
                  Learn more
                </button>
                <button type="button" class="btn btn-outline-danger">
                  <i class="bi bi-heart-fill"></i>
                </button>
                <button type="button" class="btn btn-outline-info">
                  <i class="bi bi-share-fill"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
